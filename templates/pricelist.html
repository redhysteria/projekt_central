<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cennik - Aplikacja Wyceny SEO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="fade-in">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-calculator"></i> Aplikacja Wyceny SEO
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Lista Wycen</a>
                <a class="nav-link active" href="/pricelist">Cennik</a>
                <a class="nav-link" href="/templates">Szablony Zadań</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="text-light">Cennik</h1>
                    <button class="btn btn-success" onclick="saveAllPrices()">
                        <i class="bi bi-check-circle"></i> Zapisz wszystkie zmiany
                    </button>
                </div>

                <div class="card glass-card glass-card-hover slide-up">
                    <div class="card-header">
                        <h5 class="mb-0 text-light">Stawki za pracę specjalistów</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover" id="pricelistTable">
                                <thead>
                                    <tr>
                                        <th>Typ specjalisty</th>
                                        <th>Cena [zł]</th>
                                        <th>Jednostka</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Data will be loaded here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <div class="card glass-card">
                        <div class="card-body">
                            <h5 class="text-light">Informacje o jednostkach:</h5>
                            <ul class="list-unstyled text-light">
                                <li><strong>hour</strong> - stawka za godzinę pracy</li>
                                <li><strong>1000chars</strong> - stawka za 1000 znaków tekstu</li>
                                <li><strong>piece</strong> - stawka za sztukę/usługę</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/pricelist.js') }}"></script>
</body>
</html>
